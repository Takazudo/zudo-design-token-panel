name: PR preview deploy

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build doc site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build doc site
        run: pnpm --filter doc build

      - name: Stage deploy directory
        run: bash scripts/stage-deploy.sh

      - name: Upload deploy artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: deploy
          path: deploy/
          retention-days: 1
          if-no-files-found: error

  preview:
    name: Deploy PR preview
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.8
        with:
          name: deploy
          path: deploy/

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          DEPLOY_BRANCH="pr-${PR_NUMBER}"
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt/3..."
            if wrangler pages deploy deploy \
              --project-name=zudo-design-token-panel \
              --branch="${DEPLOY_BRANCH}" \
              --commit-hash="${GITHUB_SHA}" \
              --commit-message="PR #${PR_NUMBER} preview: ${GITHUB_SHA}"; then
              echo "Deploy succeeded on attempt $attempt"
              echo "deploy_url=https://${DEPLOY_BRANCH}.zudo-design-token-panel.pages.dev/pj/zudo-design-token-panel/" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Deploy failed, retrying in 150 seconds..."
              sleep 150
            fi
          done
          echo "Deploy failed after 3 attempts"
          exit 1

      - name: Comment preview URL on PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deploy_url }}
          PR_NUMBER: ${{ github.event.number }}
        with:
          script: |
            const deployUrl = process.env.DEPLOY_URL;
            const prNumber = Number(process.env.PR_NUMBER);
            const marker = '<!-- cf-preview-pr -->';
            const body = `${marker}\n### 🟢 Cloudflare Pages preview\n\nPR preview deployed: ${deployUrl}\n\n_Updated for commit \`${context.sha.substring(0, 7)}\`._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find((c) => c.body && c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
